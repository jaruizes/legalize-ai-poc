services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./legalize-es:/app/legalize-es
      - ./data:/app/data
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
